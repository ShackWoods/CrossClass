name: PR Build Check

on:
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: ./.ci/install_dependencies.sh

      - name: Build
        run: ./.ci/build.sh

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with: 
          name: build-output
          path: ./build
          retention-days: 1

  test:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: ./build

      - name: Install dependencies
        run: ./.ci/install_dependencies.sh

      - name: Ensure permissions
        run: chmod +x ./build/tests/bin/crossclass_tests
      
      - name: Run Tests
        run: ./.ci/test.sh
